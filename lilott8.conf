# OrthodoxWiki scraper configuration (HOCON)

scraper {
  # MediaWiki API endpoint for the site to scrape.
  api_url = "https://orthodoxwiki.org/api.php"

  # Identify ourselves politely. MediaWiki etiquette asks for a real UA + contact.
  user_agent = "ortho-scrapper/1.0 (https://orthodoxwiki.org; * )"

  # Categories to crawl. Do NOT include the "Category:" prefix.
  categories = [
    "Saints"
    "Feasts"
    "Monasteries"
    "Icons"
  ]

  # Whether to descend into sub-categories discovered inside a category.
  recurse_subcategories = true
  # Hard cap on subcategory recursion depth (0 = only the listed categories).
  max_subcategory_depth = 4

  # Change detection: each run does a cheap metadata probe (lastrevid) and only
  # re-fetches a page's content if it actually changed since we last crawled it.
  # `recrawl_after` is a fallback that also forces a refresh of *unchanged* pages
  # once they're this old (handy for catching re-uploaded media, which doesn't
  # bump a page's revision id). Accepts HOCON durations ("7 days", "12 hours");
  # set to 0 to disable forced refresh and rely purely on change detection.
  recrawl_after = 7 days

  # After each run, check pages that disappeared from the configured categories.
  # Those the wiki confirms are deleted get soft-removed (removed_at stamped) and
  # are excluded from future crawls; pages that merely changed categories are kept.
  reconcile_deletions = true

  # Media (images, audio, video, documents) downloading, configured per category.
  media {
    # Master switch. If false, no media is downloaded regardless of policy below.
    enabled = true

    # FILE STORAGE PATH: directory where downloaded media files are written
    # (content-addressed by sha1). Supports ~ and $ENV_VARS; may be relative or
    # absolute, e.g. "media", "~/ortho/media", "/srv/ortho/media".
    download_dir = "/Users/jason/tmp/media/"

    # Skip files larger than this. HOCON size; 0 = no limit.
    max_file_size = 25 MB

    # Policy applied to any crawled category not named under categories_policy.
    default {
      download = false
      types = []   # any of: image, audio, video, document, other, all
    }

    # Per-category media policy. Keys are category names from `categories`
    # above; a page reached by recursing into subcategories inherits the policy
    # of the configured root category it descends from. A page found under
    # several categories gets the union of their allowed media types.
    categories_policy {
      Saints {
        download = true
        types = [image]
      }
      Feasts {
        download = true
        types = [image, audio]
      }
      Monasteries {
        download = true
        types = [image]
      }
      Icons {
      	download = true
      	types = [image]
      }
    }
  }

  # Licensing / attribution metadata, captured so the scraped data can be
  # redistributed with proper credit. OrthodoxWiki text is dual-licensed
  # GFDL + CC BY-SA 2.5 (see https://orthodoxwiki.org/OrthodoxWiki:Copyrights).
  attribution {
    site_name = "OrthodoxWiki"
    license_name = "CC BY-SA 2.5"
    license_url = "https://creativecommons.org/licenses/by-sa/2.5/"
    additional_license = "GFDL"
    copyright_page = "https://orthodoxwiki.org/OrthodoxWiki:Copyrights"
    # Image licenses can differ from the page text; this note is recorded with
    # each downloaded file's attribution sidecar.
    image_license_note = "Image licenses may differ from the page text; see the file's description page and https://orthodoxwiki.org/Help:Image_licenses"
    # Capture every page's full contributor (author) list for BY-SA attribution.
    fetch_contributors = true
  }

  rate_limit {
    # Maximum sustained requests per second across all workers.
    requests_per_second = 10.0
    # Token-bucket burst allowance.
    burst = 4
    # Maximum number of concurrent in-flight HTTP requests.
    max_concurrency = 6
  }

  http {
    # Per-request timeout in seconds.
    timeout = 30
    # Retry transient failures (5xx, network errors) this many times.
    max_retries = 3
    # Base backoff (seconds) for exponential retry; doubles each attempt.
    retry_backoff = 1.0
  }
}

# Icon & Saints data layer (licensed, multi-source). Disabled here; enable a
# source under `sources` and run `--mode icons` (ingest) / `--mode notify`
# (daily follower notifications). See scraper.conf for the fully-commented block.
# Only `approved` icons get images downloaded and may be served (gate fails closed).
icons {
  enabled = true
  download_dir = "/Users/jason/tmp/icons/"
  max_file_size = 25 MB

  sources {
    met_api {
      enabled = true
      base_license = "PD"
      requires_per_item_check = true
      attribution_template = "The Metropolitan Museum of Art, {source_record_id}"
      queries = ["orthodox icon", "byzantine icon", "russian icon", "orthodox"]
      max_objects = 200
    }
    # Wikipedia category — walks an article category and takes each article's
    # lead image (the icon). The images are Commons-hosted, so licensing is the
    # same per-file extmetadata tags as `wikimedia` (gate checks allowed_licenses;
    # locally-uploaded fair-use files quarantine). The article title is a strong
    # saint hint. subcat_depth recurses subcategories (this category is mostly
    # subcats like "Icons of the Theotokos", so depth >= 1 is usually wanted).
    wikipedia {
      enabled = false
      base_license = "UNVERIFIED"   # per-file; the Commons tag on each file decides
      requires_per_item_check = true
      allowed_licenses = ["CC0", "CC BY 4.0", "CC BY-SA 4.0", "Public domain", "PD"]
      attribution_template = "{author}, via Wikimedia Commons, {license}"
      category = "Category:Eastern Orthodox icons"
      subcat_depth = 1
      max_files = 200
    }
    iconsaint {
      enabled = false
      base_license = "CC-BY-4.0"
      requires_per_item_check = true
      attribution_template = "Icon image from the ICONSAINT dataset (Sidiropoulos, Apostolidis, Vrochidou & Papakostas, 2026, MLV Research Group, Democritus University of Thrace), CC BY. https://doi.org/10.3390/info17040340"
      dataset_path = ""   # local checkout of github.com/MachineLearningVisionRG/ICONSAINT
      manifest = ""
    }
    # WikiArt — paginated painting search. Licensing is murky (WikiArt disclaims
    # copyright; much is in-copyright) and the API exposes no clean per-image
    # license, so the gate is fail-closed: every record is CRAWLED but lands
    # `quarantined` until promoted via a license_policy / per-record override.
    # The read side serves only `approved`. Provide the key via the environment:
    #     export WIKIART_API_KEY=...    (HOCON `${?VAR}` leaves it empty if unset)
    # Limits (free tier): 4 req/s, 400 req/hour — set as a per-source budget.
    wikiart {
      enabled = false
      base_license = "UNVERIFIED"
      requires_per_item_check = true
      api_key = ${?WIKIART_API_KEY}
      queries = ["icon", "saint", "orthodox"]
      max_objects = 200
      rate_limit { requests_per_second = 4, burst = 4, max_concurrency = 2 }
      hourly_cap = 400
    }
    # Openverse — aggregated openly-licensed image search across many providers
    # (Wikimedia Commons, Flickr, museum collections, ...), anonymous access.
    # No icon-specific taxonomy, so scope comes entirely from `queries`. The
    # `license` code on each result is checked against allowed_licenses (also
    # passed to the API as a pre-filter, saving crawl budget); NC/ND variants
    # are excluded by default to match this project's redistribution stance.
    openverse {
      enabled = true
      base_license = "UNVERIFIED"   # per-record; the license code decides
      requires_per_item_check = true
      allowed_licenses = ["cc0", "pdm", "by", "by-sa"]
      queries = ["Byzantine icon", "Orthodox icon", "iconostasis"]
      max_objects = 200
      filter_dead = true
      mature = true
    }
  }

  rate_limit { requests_per_second = 2.0, burst = 4, max_concurrency = 4 }
  http { timeout = 30, max_retries = 3, retry_backoff = 1.0 }
}

# Saint roster ingestion from Wikipedia list articles (names only, no images,
# no licensing gate). Run with `--mode saints`. Article *titles*, not URLs:
# https://en.wikipedia.org/wiki/List_of_Eastern_Orthodox_saints -> the title below.
saints {
  enabled = true
  wikipedia_articles = ["List of Eastern Orthodox saints (A–G)","List of Eastern Orthodox saints (H–M)","List of Eastern Orthodox saints (N–S)","List of Eastern Orthodox saints (T–Z)","https://en.wikipedia.org/wiki/List_of_saints_in_the_Russian_Orthodox_Church","List of Serbian Eastern Orthodox saints","List of American Eastern Orthodox saints"]
  max_records = 500

  # Cap on saint names ingested across all listed articles (politeness/sanity).
  max_records = 500

  # Weight of Wikipedia bio claims in the per-field reducer. Wikipedia is the
  # spine, so it outranks enrichment sources by default.
  wikipedia_weight = 100

  # Weight of OrthodoxWiki bio claims. The saints job runs an enrichment pass
  # that matches already-crawled OrthodoxWiki pages (from `--mode wiki`) to
  # existing saints — first by name/alias (free), then by Wikidata QID for any
  # name-miss (one lookup per unmatched page) — and contributes a bio. Below
  # wikipedia_weight, so it only wins a saint's bio when Wikipedia has none. Set
  # 0 to disable the pass entirely.
  orthodoxwiki_weight = 50

  # Coarse, per-type licensing overrides (looser than the per-record DB
  # `license_overrides` table). Each entry matches by `target_type` (saint|icon)
  # plus optional `source` and `field` (omitted = wildcard); the most-specific
  # match wins. An `approved` entry may set `license`/`attribution` but attribution
  # stays mandatory (a default is synthesized if omitted). Empty by default.
  #   license_policies = [
  #     { target_type = icon,  source = iconsaint, decision = approved, license = "CC-BY-4.0" }
  #     { target_type = saint, field = bio, source = wikipedia, decision = approved }
  #   ]
  license_policies = []

  # Operator corrections applied on every saints run — the needs-review "workflow",
  # kept in version control (your audit trail). For the high-value few automation
  # can't resolve; run `--mode review` to get ready-to-edit stubs of what's pending.
  #   - saint_qid : give a needs-review saint (no Wikidata QID from Wikipedia) a QID,
  #                 keyed by its display name. Rescues it AND unlocks its Wikidata
  #                 facts (aliases/feast/description) on the same run.
  #   - feast     : curate feast day(s) for a QID. Applied at the top weight, so the
  #                 curated date sorts first (added to, not replacing, any others).
  #   - owiki_qid : map an OrthodoxWiki page title straight to a QID when neither the
  #                 name nor the auto QID-resolve matches it.
  # All empty by default.
  corrections {
    saint_qid = []   # [ { name = "Display Name", qid = "Q43216" } ]
    feast     = []   # [ { qid = "Q43216", days = ["01-27", "09-13"] } ]
    owiki_qid = []   # [ { title = "OrthodoxWiki Page Title", qid = "Q43216" } ]
  }

}

database {
  # Storage backend: "postgres" or "sqlite".
  backend = "sqlite"

  # --- SQLite settings (used when backend = "sqlite") ---
  # DB STORAGE PATH: path to the SQLite database file; created if it does not
  # exist. Supports ~ and $ENV_VARS; may be relative or absolute, e.g.
  # "orthodoxwiki.db", "~/ortho/data.db", "/srv/ortho/data.db".
  path = "/Users/jason/tmp/db/orthodoxwiki.db"

  # --- PostgreSQL settings (used when backend = "postgres") ---
  host = "localhost"
  port = 5432
  name = "orthodoxwiki"
  user = "postgres"
  password = ""
  # Connection pool sizing.
  pool_min_size = 2
  pool_max_size = 8
}
